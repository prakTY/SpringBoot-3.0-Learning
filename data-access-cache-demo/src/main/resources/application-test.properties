# Test Configuration

# Test Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=LEGACY
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Test Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.globally_quoted_identifiers=true

# MongoDB Test Configuration (use embedded MongoDB for testing)
spring.data.mongodb.port=27018
spring.data.mongodb.database=test_db

# Redis Test Configuration (use embedded Redis for testing)
spring.redis.host=localhost
spring.redis.port=6380
spring.redis.database=15

# Memcached Test Configuration
memcached.servers=localhost:11212
memcached.pool.size=5

# Logging
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.test=DEBUG