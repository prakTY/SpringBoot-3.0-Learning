<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>文件上传</title>
    <style>
        .upload-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        .btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>文件上传</h2>
        
        <form class="upload-form" action="/api/files/upload" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>选择文件：</label>
                <input type="file" name="file" required>
            </div>
            <button type="submit" class="btn">上传</button>
        </form>
        
        <form class="upload-form" action="/api/files/uploads" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>选择多个文件：</label>
                <input type="file" name="files" multiple required>
            </div>
            <button type="submit" class="btn">批量上传</button>
        </form>
        
        <div class="result" id="uploadResult"></div>
    </div>
    
    <script>
        document.querySelectorAll('.upload-form').forEach(form => {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                const resultDiv = document.getElementById('uploadResult');
                
                try {
                    const response = await fetch(this.action, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.code === 200) {
                        if (Array.isArray(data.data)) {
                            resultDiv.innerHTML = `
                                <h3>上传成功</h3>
                                ${data.data.map(item => `
                                    <p>文件名：${item.fileName}</p>
                                    <p>文件路径：${item.filePath}</p>
                                    <p>文件大小：${item.fileSize}</p>
                                    <hr>
                                `).join('')}
                            `;
                        } else {
                            resultDiv.innerHTML = `
                                <h3>上传成功</h3>
                                <p>文件名：${data.data.fileName}</p>
                                <p>文件路径：${data.data.filePath}</p>
                                <p>文件大小：${data.data.fileSize}</p>
                            `;
                        }
                    } else {
                        resultDiv.innerHTML = `<h3>上传失败</h3><p>${data.message}</p>`;
                    }
                } catch (error) {
                    resultDiv.innerHTML = `<h3>上传错误</h3><p>${error.message}</p>`;
                }
            });
        });
    </script>
</body>
</html>
